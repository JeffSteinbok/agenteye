name: Create Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'
      prerelease:
        description: 'Pre-release label (leave empty for stable release)'
        required: false
        type: choice
        options:
          - ''
          - 'a1'
          - 'b1'
          - 'b2'
          - 'b3'
          - 'rc1'
          - 'rc2'
        default: ''

# Runs full CI checks before bumping version to ensure a clean build.

jobs:
  lint:
    uses: ./.github/workflows/_lint-python.yml

  test:
    uses: ./.github/workflows/_test-python.yml

  frontend:
    uses: ./.github/workflows/_build-frontend.yml

  bump-version:
    runs-on: ubuntu-latest
    needs: [lint, test, frontend]
    outputs:
      new_version: ${{ steps.calc_version.outputs.new_version }}
      is_prerelease: ${{ steps.calc_version.outputs.is_prerelease }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Get current version
        id: get_version
        run: |
          CURRENT_VERSION=$(grep -oP '__version__\s*=\s*"\K[0-9]+\.[0-9]+\.[0-9]+' src/__version__.py)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Calculate new version
        id: calc_version
        run: |
          CURRENT="${{ steps.get_version.outputs.current_version }}"
          IFS='.' read -r major minor patch <<< "$CURRENT"

          case "${{ github.event.inputs.version_bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          NEW_VERSION="${major}.${minor}.${patch}"
          PRERELEASE="${{ github.event.inputs.prerelease }}"
          if [ -n "$PRERELEASE" ]; then
            NEW_VERSION="${NEW_VERSION}${PRERELEASE}"
          fi
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$( [ -n \"$PRERELEASE\" ] && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update version in src/__version__.py
        run: |
          sed -i 's/__version__\s*=\s*"[^"]*"/__version__ = "${{ steps.calc_version.outputs.new_version }}"/' src/__version__.py
          echo "Updated src/__version__.py with version ${{ steps.calc_version.outputs.new_version }}"

      - name: Install dependencies and export OpenAPI spec
        run: |
          pip install -r requirements.txt
          python -m scripts.export_openapi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        run: |
          git add src/__version__.py docs/openapi.json
          git commit -m "Bump version to ${{ steps.calc_version.outputs.new_version }}"
          git push

      - name: Create Git tag
        run: |
          git tag -a "v${{ steps.calc_version.outputs.new_version }}" -m "Release v${{ steps.calc_version.outputs.new_version }}"
          git push origin "v${{ steps.calc_version.outputs.new_version }}"

  create-release:
    needs: [bump-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.new_version }}
          name: Release v${{ needs.bump-version.outputs.new_version }}
          body: |
            ## Release v${{ needs.bump-version.outputs.new_version }}

            ### Installation

            ```bash
            pip install ghcp-cli-dashboard${{ needs.bump-version.outputs.is_prerelease == 'true' && ' --pre' || '' }}
            ```

            ### Desktop App (optional)

            ```bash
            copilot-dashboard install-app
            ```

            Or download the desktop app for your platform from the assets below.

            ### What's New
            - Automatic release created via GitHub Actions
          draft: true
          prerelease: ${{ needs.bump-version.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop-app:
    needs: [bump-version, create-release]
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
            asset_name: copilot-dashboard-mac-arm64.zip
          - os: macos-13
            platform: mac
            arch: x64
            asset_name: copilot-dashboard-mac-x64.zip
          - os: windows-latest
            platform: win
            arch: x64
            asset_name: copilot-dashboard-win-x64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: v${{ needs.bump-version.outputs.new_version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Install Electron dependencies
        working-directory: electron
        run: npm ci

      - name: Update version in package.json
        working-directory: electron
        shell: bash
        run: |
          VERSION="${{ needs.bump-version.outputs.new_version }}"
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Build desktop app
        working-directory: electron
        run: npm run pack

      - name: Package (macOS)
        if: runner.os == 'macOS'
        working-directory: electron
        run: |
          cd dist-electron/mac-${{ matrix.arch }}
          zip -r -y "../../${{ matrix.asset_name }}" "Copilot Dashboard.app"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: electron
        shell: pwsh
        run: |
          Compress-Archive -Path "dist-electron/win-unpacked/*" -DestinationPath "${{ matrix.asset_name }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.new_version }}
          files: electron/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
